services:
  frontend:
    image: node:24-alpine
    container_name: frontend
    working_dir: /app
    #user: "${UID}:${GID}"

    ports:
      - "4200:4200"

    volumes:
      # Editable Angular code
      - ./:/app

      # node_modules isolated in Docker
      - node_modules:/app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: >
      sh -c "
        if [ ! -d node_modules/chokidar ]; then
          npm install;
        fi &&
        npx ng serve --host 0.0.0.0 --port 4200 --poll=2000
      "

volumes:
  node_modules:
